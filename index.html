<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Snake Game 🐍</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #1a1a1a;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #fff;
            overflow: hidden;
        }
        h1 {
            margin-bottom: 10px;
            color: #4CAF50;
            text-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
        }
        #score-board {
            font-size: 24px;
            margin-bottom: 15px;
        }
        canvas {
            background-color: #000;
            border: 4px solid #4CAF50;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.3);
        }
        .controls {
            margin-top: 15px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>

    <h1>RETRO SNAKE</h1>
    <div id="score-board">Score: <span id="score">0</span></div>
    
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div class="controls">Use Arrow Keys (↑, ↓, ←, →) to Control</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        // Grid size aur Snake variables
        const gridSize = 20; 
        const tileCount = canvas.width / gridSize;

        let snake = [{x: 10, y: 10}]; // Snake ki starting position
        let food = {x: 5, y: 5};       // Food ki starting position
        let dx = 0;                    // X-axis par speed/direction
        let dy = 0;                    // Y-axis par speed/direction
        let score = 0;
        let gameInterval;

        // Game Loop ko start karna (Speed: 100ms)
        function startGame() {
            gameInterval = setInterval(updateGame, 100);
        }

        // Main Game Logic Function
        function updateGame() {
            moveSnake();

            if (checkGameOver()) {
                clearInterval(gameInterval);
                alert(`Game Over! Aapka Score: ${score}\nDobara khelne ke liye OK press karein.`);
                resetGame();
                return;
            }

            checkFoodCollision();
            drawEverything();
        }

        // Canvas par sab kuch draw karna
        function drawEverything() {
            // 1. Clear Canvas
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. Draw Snake
            ctx.fillStyle = "#4CAF50"; // Green Snake
            snake.forEach((part, index) => {
                // Head ko thoda dark green rakh sakte hain
                ctx.fillStyle = index === 0 ? "#2E7D32" : "#4CAF50";
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });

            // 3. Draw Food
            ctx.fillStyle = "#FF5252"; // Red Food
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }

        // Snake ki position update karna
        function moveSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head); // Naya head aage add karo
            snake.pop();         // Piche se ek part hatao (agar food nahi khaya toh)
        }

        // Check karna ki kya snake ne food khaya?
        function checkFoodCollision() {
            if (snake[0].x === food.x && snake[0].y === food.y) {
                score += 10;
                scoreElement.innerText = score;
                
                // Snake ki tail ko grow karne ke liye pop nahi hone diya, 
                // isliye hum unshift ke baad pop ka counter balance karne ke liye push kar dete hain
                snake.push({}); 
                
                generateNewFood();
            }
        }

        // Random jagah par Food generate karna
        function generateNewFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);

            // Food snake ke body ke upar generate na ho, uske liye check
            snake.forEach(part => {
                if (part.x === food.x && part.y === food.y) {
                    generateNewFood();
                }
            });
        }

        // Game Over Conditions (Deewar ya khud se takrana)
        function checkGameOver() {
            // Deewar se takrana
            if (snake[0].x < 0 || snake[0].x >= tileCount || snake[0].y < 0 || snake[0].y >= tileCount) {
                return true;
            }

            // Khud ki body se takrana
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) {
                    return true;
                }
            }
            return false;
        }

        // Game ko restart karna
        function resetGame() {
            snake = [{x: 10, y: 10}];
            food = {x: 5, y: 5};
            dx = 0;
            dy = 0;
            score = 0;
            scoreElement.innerText = score;
            startGame();
        }

        // Keyboard Controls ko handle karna
        window.addEventListener("keydown", e => {
            switch (e.key) {
                case "ArrowUp":
                    if (dy === 0) { dx = 0; dy = -1; } // Agar snake niche ja raha hai toh upar nahi mod sakte
                    break;
                case "ArrowDown":
                    if (dy === 0) { dx = 0; dy = 1; }
                    break;
                case "ArrowLeft":
                    if (dx === 0) { dx = -1; dy = 0; }
                    break;
                case "ArrowRight":
                    if (dx === 0) { dx = 1; dy = 0; }
                    break;
            }
        });

        // Game Start
        startGame();
    </script>
</body>
</html>
